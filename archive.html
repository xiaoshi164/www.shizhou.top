<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#07111f">
  <meta name="description" content="Shizhou 项目归档页。">
  <meta name="keywords" content="项目归档, 项目列表, 作品展示">
  <title>Shizhou // Archive</title>
  <link rel="stylesheet" href="static/css/scifi-blog.css">
  <link rel="stylesheet" href="static/css/content-pages.css">
  <script defer src="static/js/content-data.js"></script>
  <script defer src="static/js/content-pages.js"></script>
</head>

<body>
  <div class="site-shell">
    <div class="ambient ambient-one"></div>
    <div class="ambient ambient-two"></div>

    <header class="topbar">
      <a class="brand" href="index.html" aria-label="Shizhou Archive">
        <span class="brand-mark">SHIZHOU</span>
        <span class="brand-sub">ARCHIVE</span>
      </a>

      <nav class="nav">
        <a href="index.html">首页</a>
        <a href="archive.html">归档</a>
        <a href="article.html?slug=walkbyfaith-feature-breakdown">详情</a>
      </nav>

      <a class="nav-cta" href="article.html?slug=walkbyfaith-feature-breakdown">精选项目</a>
    </header>

    <main class="page-shell">
      <section class="panel page-hero reveal">
        <div class="page-hero-copy">
          <p class="eyebrow">ARCHIVE / PROJECTS / BROWSE</p>
          <h1>项目归档</h1>
          <p class="archive-intro">
            这里放全部项目，想继续看就直接点进去。
          </p>

          <div class="subnav">
            <a class="subnav-link" href="index.html#project-deck">返回首页</a>
            <a class="subnav-link" href="article.html?slug=walkbyfaith-feature-breakdown">打开精选项目</a>
          </div>
        </div>
      </section>

      <section class="section reveal">
        <div class="section-heading">
          <div>
            <p class="eyebrow">FILTER</p>
            <h2>分类查看</h2>
          </div>
          <p class="section-copy">
            可以按项目类型筛选。
          </p>
        </div>

        <div class="archive-controls" id="archive-filters"></div>
      </section>

      <section class="section reveal">
        <div class="section-heading">
          <div>
            <p class="eyebrow">PROJECTS</p>
            <h2>全部项目</h2>
          </div>
          <p class="section-copy">
            每张卡片都可以进入详情页。
          </p>
        </div>

        <div class="archive-grid" id="archive-grid"></div>
      </section>

      <section class="archive-rail reveal">
        <article class="section">
          <div class="section-heading">
            <div>
              <p class="eyebrow">STATUS</p>
              <h2>归档状态</h2>
            </div>
            <p class="section-copy">当前已经可以直接浏览。</p>
          </div>
          <div class="archive-stats" id="archive-stats"></div>
        </article>

        <article class="topic-cluster">
          <span class="panel-tag">TOPICS</span>
          <h3>项目类型</h3>
          <p class="hero-note">当前项目按类型整理。</p>
          <div class="topic-cloud" id="topic-cloud"></div>
        </article>
      </section>
    </main>

    <footer class="footer">
      <div>
        <span class="footer-mark">SHIZHOU // ARCHIVE</span>
        <p>项目归档页</p>
      </div>
      <div class="footer-meta">
        <span id="sync-time">SYNCING...</span>
        <span id="year-mark">2026</span>
      </div>
    </footer>
  </div>
</body>

</html>
